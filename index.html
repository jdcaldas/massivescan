
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MASSIVE SCAN DESIGN SYSTEM</title>
    <style>
      :root {
        --color-bg: #C8F7E8;
        --color-surface: #FFFFFF;
        --color-primary: #000000;
        --color-secondary: #A7F3D0;
        --color-text: #000000;
        --color-subtle: #374151;
      }
      .dark {
        --color-bg:      #0d1117;
        --color-surface: #161b22;
        --color-primary: #6EE7B7;
        --color-secondary:#21262d;
        --color-text:    #e6edf3;
        --color-subtle:  #7d8590;
      }

      /* ── Neo Brutalism Utilities ── */
      .neo-card {
        border: 2px solid #000;
        box-shadow: 5px 5px 0 0 #000;
        border-radius: 2px;
        transition: box-shadow 80ms ease, transform 80ms ease;
      }
      .neo-card:hover {
        box-shadow: 8px 8px 0 0 #000;
        transform: translate(-3px, -3px);
      }
      .dark .neo-card { border-color: rgba(110,231,183,0.25); box-shadow: 5px 5px 0 0 rgba(110,231,183,0.15); }
      .dark .neo-card:hover { box-shadow: 8px 8px 0 0 rgba(110,231,183,0.25); }

      .neo-btn {
        border: 2px solid #000;
        box-shadow: 3px 3px 0 0 #000;
        border-radius: 1px;
        font-weight: 800;
        transition: box-shadow 80ms ease, transform 80ms ease;
        cursor: pointer;
      }
      .neo-btn:hover:not(:disabled) {
        box-shadow: 5px 5px 0 0 #000;
        transform: translate(-2px, -2px);
      }
      .neo-btn:active:not(:disabled) {
        box-shadow: 0 0 0 0 #000;
        transform: translate(3px, 3px);
      }
      .neo-btn:disabled { opacity: 0.35; cursor: not-allowed; }
      .dark .neo-btn { border-color: rgba(110,231,183,0.45); box-shadow: 3px 3px 0 0 rgba(110,231,183,0.25); }
      .dark .neo-btn:hover:not(:disabled) { box-shadow: 5px 5px 0 0 rgba(110,231,183,0.35); }
      .dark .neo-btn:active:not(:disabled) { box-shadow: 0 0 0 0 rgba(110,231,183,0.25); }

      .neo-input {
        border: 2px solid #000;
        border-radius: 1px;
        transition: box-shadow 80ms ease;
      }
      .neo-input:focus { outline: none; box-shadow: 4px 4px 0 0 #000; }
      .dark .neo-input { border-color: rgba(110,231,183,0.2); }
      .dark .neo-input:focus { border-color: rgba(110,231,183,0.5); box-shadow: 4px 4px 0 0 rgba(110,231,183,0.15); }

      .neo-section-label {
        font-size: 9px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: #000;
        opacity: 0.35;
        margin-bottom: 6px;
      }
      .dark .neo-section-label { color: #7d8590; opacity: 1; }

      /* ── Shadow tier system ──────────────────────────────────────────────
       * Three offsets cover every elevation use case. Migrate inline
       * `boxShadow: 'Npx Npx 0 #000'` styles to these classes when possible.
       *
       *   .neo-shadow-sm  — 2px · small inline buttons, chips, badges
       *   .neo-shadow     — 3px · default (already baked into .neo-btn)
       *   .neo-shadow-lg  — 6px · modals (Recycle Bin, Usage, Card Preview…)
       *
       * Keep .neo-card on 5px (it sits at a mid-elevation between btn and modal).
       */
      .neo-shadow-sm { box-shadow: 2px 2px 0 0 #000; }
      .neo-shadow    { box-shadow: 3px 3px 0 0 #000; }
      .neo-shadow-lg { box-shadow: 6px 6px 0 0 #000; }
      .dark .neo-shadow-sm { box-shadow: 2px 2px 0 0 rgba(110,231,183,0.25); }
      .dark .neo-shadow    { box-shadow: 3px 3px 0 0 rgba(110,231,183,0.25); }
      .dark .neo-shadow-lg { box-shadow: 6px 6px 0 0 rgba(110,231,183,0.3); }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'brand-bg': 'var(--color-bg)',
              'brand-surface': 'var(--color-surface)',
              'brand-primary': 'var(--color-primary)',
              'brand-secondary': 'var(--color-secondary)',
              'brand-text': 'var(--color-text)',
              'brand-subtle': 'var(--color-subtle)',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          }
        }
      }
    </script>
